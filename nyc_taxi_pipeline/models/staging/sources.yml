version: 2

sources:
  - name: raw
    database: LEARNING_DB
    schema: RAW

    tables:
      - name: yellow_trips_raw
        description: >
          Silver-layer NYC Taxi trip data loaded from Databricks.
          One row per trip after cleaning and validation.
        
        # FIX: Wrap the freshness block inside 'config'
        config:
          loaded_at_field: _cleaned_at
          freshness:
            warn_after:  {count: 25, period: hour}
            error_after: {count: 49, period: hour}

        columns:
          - name: tpep_pickup_datetime
            description: "Pickup timestamp"
          - name: tpep_dropoff_datetime
            description: "Dropoff timestamp"
          - name: fare_amount
            description: "Base meter fare in USD"
          - name: total_amount
            description: "Total charge including all fees and tips"
          - name: _batch_id
            description: "Monthly batch identifier e.g. 2024-01"
          - name: _cleaned_at
            description: "Timestamp when Silver transformation completed in Databricks"
